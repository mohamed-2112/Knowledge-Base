spring.application.name=knowledge-base

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# spring.datasource.url=jdbc:postgresql://localhost:5432/knowledgebase
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/knowledgebase}

# spring.datasource.username=postgres
# spring.datasource.password=password
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.type.json_format_mapper=com.mrm.knowledge_base.util.CustomHibernateJsonFormatter


# app.frontend.redirect-url=http://localhost:3000/oauth2/success
app.frontend.redirect-url=${APP_FRONTEND_REDIRECT_URL:http://localhost:3000/oauth2/success}
app.frontend.origin=${APP_FRONTEND_ORIGIN:http://localhost:3000}


ai-agent.base-url=${AI_AGENT_BASE_URL:http://localhost:8001}
ai-agent.service-token=${AI_AGENT_SERVICE_TOKEN:change-this-secret-value}
